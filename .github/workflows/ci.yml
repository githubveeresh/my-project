# This is workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-java:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2

    - name: Set up JDK 1.8
      uses: actions/setup-java@v1
      with:
        java-version: 1.8

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build
    - name: Build the image
      run: docker build -t neduru/sample-project:latest .
    - name: Check if secrets are set
      run: |
        if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
        echo "DOCKER_USERNAME is EMPTY"
        exit 1
        else
        echo "DOCKER_USERNAME is defined"
        fi
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
       username: ${{ secrets.DOCKER_USERNAME }}
    # Make sure this name matches exactly what you named the secret in Step 2
       password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      run: |
       docker build -t docker.io/neduru/sample-project:${{ github.sha }} .
       docker push docker.io/neduru/sample-project:${{ github.sha }}

